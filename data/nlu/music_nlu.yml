version: "3.1"

nlu:

- intent: ask_song_recommendation
  examples: |
    - Recommend a song
    - What should I listen to?
    - Suggest some music
    - What's a good song?
    - Give me a music recommendation
    - Play me something good
    - I need new music to listen to
    - What songs do you recommend?
    - Suggest me a track
    - What music should I listen to today?
    - Can you recommend some music?
    - Help me find a good song
    - What's worth listening to?
    - Tell me a great song
    - Any music recommendations?

- intent: ask_song_by_genre
  examples: |
