    - Show me [R&B](genre) songs
    - I feel like [country](genre) music today
    - What are good [electronic](genre) tracks?
    - Give me a [reggae](genre) recommendation
    - I love [indie](genre) music, any suggestions?
    - Find me some [metal](genre) songs
    - What are the best [blues](genre) tracks?
    - Any great [folk](genre) artists?
    - I want something [chill](genre) to listen to
    - Recommend some [lo-fi](genre) music
    - I'm feeling [sad](genre) music right now
    - Give me some [workout](genre) music
    - Any good [acoustic](genre) songs?

