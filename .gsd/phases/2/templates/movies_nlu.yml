version: "3.1"

nlu:
- intent: ask_movie_recommendation
  examples: |
    - Recommend me a movie
    - What should I watch?
    - Suggest a good film
    - I want to watch something tonight
    - Can you suggest a movie?
    - What's a good movie to watch?
    - Give me a movie recommendation
    - I need something to watch
    - What movie should I pick?
